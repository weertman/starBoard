<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Option B</title><style>:root {
  --bg: #f5f6f8;
  --card: #ffffff;
  --ink: #1b1f24;
  --muted: #667085;
  --line: #d6dae1;
  --blue: #2f6fed;
  --blue-soft: #eaf1ff;
  --green: #108a5b;
  --amber: #c98600;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; font-family: Inter, Arial, sans-serif; background: var(--bg); color: var(--ink); }
body { min-height: 100vh; }
.page { max-width: 430px; margin: 0 auto; min-height: 100vh; background: var(--bg); }
.phone { padding: 12px; display: grid; gap: 12px; }
.topbar { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 12px; display: grid; gap: 6px; }
.title { font-size: 20px; font-weight: 700; }
.subtle { color: var(--muted); font-size: 13px; }
.row { display: flex; gap: 8px; align-items: center; }
.row.wrap { flex-wrap: wrap; }
.spread { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
.btn, .chip { border: 1px solid var(--line); background: #fff; color: var(--ink); border-radius: 10px; padding: 10px 12px; font-size: 14px; }
.btn.primary { background: var(--blue); color: white; border-color: var(--blue); }
.btn.ghost { background: var(--blue-soft); border-color: #cfe0ff; }
.chip.active { background: var(--blue-soft); border-color: #cfe0ff; color: var(--blue); }
.hero { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 12px; }
.image-stage { height: 380px; border-radius: 14px; border: 1px dashed #b8c2d1; background: linear-gradient(180deg, #f0f4fb, #dbe7f8); position: relative; overflow: hidden; }
.image-stage .caption { position: absolute; left: 10px; top: 10px; background: rgba(255,255,255,.88); border: 1px solid #d8dfeb; border-radius: 999px; padding: 6px 10px; font-size: 12px; }
.image-stage .marker { position: absolute; right: 12px; bottom: 12px; background: rgba(27,31,36,.72); color: white; border-radius: 999px; padding: 6px 10px; font-size: 12px; }
.thumb-strip { display: grid; grid-auto-flow: column; grid-auto-columns: 88px; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
.thumb { background: linear-gradient(180deg, #f0f4fb, #dbe7f8); border: 1px solid var(--line); border-radius: 12px; height: 84px; position: relative; }
.thumb::after { content: ''; position: absolute; inset: 10px; border-radius: 8px; border: 1px dashed #aeb7c5; }
.thumb.active { outline: 3px solid #b8d0ff; }
.sheet { background: var(--card); border: 1px solid var(--line); border-radius: 18px 18px 0 0; padding: 14px 12px 24px; display: grid; gap: 10px; box-shadow: 0 -6px 20px rgba(0,0,0,.05); }
.handle { width: 54px; height: 5px; border-radius: 999px; background: #d1d6df; margin: 0 auto 2px; }
.field { display: grid; gap: 5px; }
.label { font-size: 13px; color: var(--muted); }
.input { background: white; border: 1px solid var(--line); border-radius: 10px; min-height: 42px; padding: 10px 12px; }
.section { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 12px; display: grid; gap: 10px; }
.kicker { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
.home-grid { display: grid; gap: 12px; }
.home-card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 16px; display: grid; gap: 8px; }
.home-card .cta { margin-top: 4px; }
.progress { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.progress .step { height: 6px; border-radius: 999px; background: #d8dde7; }
.progress .step.active { background: var(--blue); }
.compare-split { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.panel { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 10px; display: grid; gap: 8px; }
.mini-stage { height: 230px; border-radius: 12px; border: 1px dashed #b8c2d1; background: linear-gradient(180deg, #f0f4fb, #dbe7f8); position: relative; overflow: hidden; }
.bottom-nav { position: sticky; bottom: 0; background: rgba(245,246,248,.96); backdrop-filter: blur(8px); padding: 8px 12px 14px; }
.navbar { background: var(--card); border: 1px solid var(--line); border-radius: 14px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 6px; }
.nav-item { text-align: center; padding: 10px 8px; border-radius: 10px; font-size: 13px; color: var(--muted); }
.nav-item.active { background: var(--blue-soft); color: var(--blue); font-weight: 600; }
.notice { border-left: 4px solid var(--amber); background: #fff9eb; padding: 10px 12px; border-radius: 10px; font-size: 13px; }
.index-list { display: grid; gap: 12px; }
a.card-link { text-decoration: none; color: inherit; }
.card-link .home-card:hover { border-color: #a8badf; }
</style></head>
<body><div class="page"><div class="phone">
<div class="topbar">
  <div class="kicker">Step 3 of 5</div>
  <div class="title">Compare</div>
  <div class="progress"><div class="step active"></div><div class="step active"></div><div class="step active"></div><div class="step"></div><div class="step"></div></div>
  <div class="subtle">Capture → Lookup → Compare → Metadata → Submit</div>
</div>
<div class="compare-split">
  <div class="panel">
    <strong>Local</strong>
    <div class="mini-stage"><div class="caption">Current local</div></div>
    <div class="row"><button class="btn">Prev</button><button class="btn">Next</button></div>
  </div>
  <div class="panel">
    <strong>Archive</strong>
    <div class="mini-stage"><div class="caption">Anchovy</div></div>
    <div class="row"><button class="btn">Prev</button><button class="btn">Next</button></div>
  </div>
</div>
<div class="section">
  <div><strong>Decision</strong></div>
  <div class="row wrap"><div class="chip active">Looks close</div><div class="chip">Need metadata</div><div class="chip">Not this star</div></div>
</div>
<div class="spread"><button class="btn">Back</button><button class="btn primary">Next: Metadata</button></div>
</div></div></body></html>
